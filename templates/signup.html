{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow p-4 mt-4">
            <h3 class="text-center text-success fw-bold mb-4">📝 Create Account</h3>

            <!-- Flash messages (success or error) -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Signup Form -->
            <form method="POST" action="/signup">

                <!-- Name Field -->
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                </div>

                <!-- Email Field -->
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">Create Account</button>
                </div>

            </form>

            <!-- Link to Login -->
            <p class="text-center mt-3">
                Already have an account? <a href="/login" class="text-success">Login here</a>
            </p>

        </div>
    </div>
</div>

{% endblock %}
