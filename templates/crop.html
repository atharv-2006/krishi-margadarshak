{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow p-4 mt-4">

            <h3 class="text-center text-success fw-bold mb-2">
                🌱 AI Crop Recommendation
            </h3>
            <p class="text-center text-muted mb-4">
                Tell us about your farm and our AI will suggest the best crop!
            </p>

            <form method="POST" action="/crop">

                <!-- Season -->
                <div class="mb-3">
                    <label class="form-label fw-bold">☀️ Select Season</label>
                    <select name="season" class="form-select" required>
                        <option value="">-- Choose Season --</option>
                        <option value="Summer">Summer</option>
                        <option value="Winter">Winter</option>
                        <option value="Monsoon">Monsoon</option>
                    </select>
                </div>

                <!-- Soil Type -->
                <div class="mb-3">
                    <label class="form-label fw-bold">🌍 Select Soil Type</label>
                    <select name="soil" class="form-select" required>
                        <option value="">-- Choose Soil Type --</option>
                        <option value="Sandy Soil">Sandy Soil</option>
                        <option value="Clay Soil">Clay Soil</option>
                        <option value="Loamy Soil">Loamy Soil</option>
                        <option value="Black Soil">Black Soil</option>
                        <option value="Red Soil">Red Soil</option>
                    </select>
                </div>

                <!-- Water Availability -->
                <div class="mb-3">
                    <label class="form-label fw-bold">💧 Water Availability</label>
                    <select name="water" class="form-select" required>
                        <option value="">-- Choose Water Availability --</option>
                        <option value="Low (Rain only)">Low (Rain only)</option>
                        <option value="Medium (Some irrigation)">Medium (Some irrigation)</option>
                        <option value="High (Full irrigation)">High (Full irrigation)</option>
                    </select>
                </div>

                <!-- Budget -->
                <div class="mb-3">
                    <label class="form-label fw-bold">💰 Budget</label>
                    <select name="budget" class="form-select" required>
                        <option value="">-- Choose Budget --</option>
                        <option value="Low (under Rs. 10,000)">Low (under Rs. 10,000)</option>
                        <option value="Medium (Rs. 10,000 - 50,000)">Medium (Rs. 10,000 - 50,000)</option>
                        <option value="High (above Rs. 50,000)">High (above Rs. 50,000)</option>
                    </select>
                </div>

                <!-- Farm Size -->
                <div class="mb-3">
                    <label class="form-label fw-bold">📐 Farm Size (in acres)</label>
                    <input type="number"
                           name="farm_size"
                           class="form-control"
                           placeholder="e.g. 2"
                           min="0.5"
                           step="0.5"
                           required>
                </div>

                <!-- Previous Crop -->
                <div class="mb-3">
                    <label class="form-label fw-bold">🌾 Previous Crop Grown</label>
                    <input type="text"
                           name="previous_crop"
                           class="form-control"
                           placeholder="e.g. Wheat, Rice, None"
                           required>
                </div>

                <!-- Submit -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">
                        🤖 Get AI Recommendation
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
